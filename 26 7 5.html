body {

.container { max-width: 1100px; margin: 0 auto; padding: 20px; }
.header {

  padding: 30px;
  border-radius: 12px;
  margin-bottom: 24px;
  text-align: center;
}
.header h1 { font-size: 28px; margin-bottom: 6px; }
.header p { font-size: 14px; opacity: 0.8; }
.input-section {

  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.input-section textarea {
  width: 100%;
  min-height: 180px;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  padding: 16px;
  font-size: 15px;
  font-family: inherit;
  resize: vertical;
  transition: border-color 0.2s;
}
.input-section textarea:focus {
  outline: none;
  border-color: #0f3460;
}
.btn-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
.btn {
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-primary { background: #0f3460; color: #fff; }
.btn-primary:hover { background: #1a4a8a; }
.btn-secondary { background: #e8e8e8; color: #555; }
.btn-secondary:hover { background: #d5d5d5; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.output-section { margin-bottom: 24px; }
.phase-card {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  border-left: 4px solid #0f3460;
}
.phase-card.phase-0 { border-left-color: #e74c3c; }
.phase-card.phase-1 { border-left-color: #e67e22; }
.phase-card.phase-overview { border-left-color: #9b59b6; }
.phase-card.phase-top3 { border-left-color: #1abc9c; }
.phase-card.phase-2 { border-left-color: #2ecc71; }
.phase-card.phase-3 { border-left-color: #3498db; }
.phase-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid #f0f0f0;
}
.phase-content { font-size: 14px; }
.phase-content pre {
  background: #f8f9fa;
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  padding: 16px;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  font-size: 13px;
  line-height: 1.7;
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin: 16px 0;
}
.stat-card {
  background: #f8f9fa;
  border: 1px solid #e8e8e8;
  border-radius: 8px;
  padding: 14px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 24px;
  font-weight: 700;
  color: #0f3460;
  margin-bottom: 4px;
}
.stat-card .stat-label {
  font-size: 12px;
  color: #888;
}
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 16px 0;
}
.chart-box {
  background: #f8f9fa;
  border: 1px solid #e8e8e8;
  border-radius: 8px;
  padding: 16px;
  text-align: center;
}
.chart-box h5 {
  font-size: 14px;
  margin-bottom: 10px;
  color: #0f3460;
}
.chart-box canvas {
  max-width: 100%;
  height: auto;
}
.chart-legend {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
  font-size: 12px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  display: inline-block;
}
.dsdi-bar-chart {
  margin: 16px 0;
  background: #f8f9fa;
  border: 1px solid #e8e8e8;
  border-radius: 8px;
  padding: 16px;
}
.dsdi-bar-chart h5 {
  font-size: 14px;
  margin-bottom: 12px;
  color: #0f3460;
  text-align: center;
}
.dsdi-bar {
  display: flex;
  align-items: center;
  margin-bottom: 6px;
  font-size: 12px;
}
.dsdi-bar .bar-label {
  width: 50px;
  flex-shrink: 0;
  text-align: right;
  padding-right: 8px;
  color: #666;
}
.dsdi-bar .bar-track {
  flex: 1;
  height: 20px;
  background: #e8e8e8;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.dsdi-bar .bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.dsdi-bar .bar-value {
  width: 55px;
  flex-shrink: 0;
  padding-left: 8px;
  color: #333;
  font-weight: 600;
}
.stat-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 13px;
}
.stat-table th, .stat-table td {
  border: 1px solid #e0e0e0;
  padding: 8px 12px;
  text-align: center;
}
.stat-table th { background: #f5f7fa; font-weight: 600; }
.stat-table tr:nth-child(even) { background: #fafbfc; }
.sentence-block {
  background: #fafbfc;
  border: 1px solid #e8e8e8;
  border-radius: 8px;
  padding: 16px;
  margin: 12px 0;

  line-height: 1.5;
  background: #f8f9fa;
  padding: 12px;
  border-radius: 4px;
  border: 1px solid #e8e8e8;
  white-space: pre;
  overflow-x: auto;

  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 6px;

.badge-easy { background: #d5f5e3; color: #27ae60; }

.badge-hard { background: #fdebd0; color: #e67e22; }
.badge-veryhard { background: #fadbd8; color: #e74c3c; }
.badge-extreme { background: #f5b7b1; color: #922b21; }
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #ccc;
  border-top-color: #0f3460;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #888; font-size: 14px; }
.collapse-toggle {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.collapse-toggle::before {
  content: '▼';
  font-size: 10px;
  transition: transform 0.2s;
}
.collapse-toggle.collapsed::before {
  transform: rotate(-90deg);
}
.collapse-body {
  max-height: none;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.collapse-body.hidden {
  display: none;
}
.top3-item {
  background: linear-gradient(135deg, #f0f4ff 0%, #e8ecff 100%);
  border: 1px solid #d0d8ff;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.top3-item.rank-1 {
  background: linear-gradient(135deg, #fff0e6 0%, #ffe4cc 100%);
  border-color: #ffc299;
}
.top3-item.rank-2 {
  background: linear-gradient(135deg, #f0f4ff 0%, #e0e8ff 100%);
  border-color: #b3c6ff;
}
.top3-item.rank-3 {
  background: linear-gradient(135deg, #e6fff0 0%, #ccffdd 100%);
  border-color: #99e6b3;

.top3-rank {
  display: inline-block;
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  border-radius: 50%;
  font-weight: 700;
  font-size: 14px;
  margin-right: 8px;
  background: #fff;

.top3-item.rank-2 .top3-rank { background: #4a7dff; color: #fff; }
.top3-item.rank-3 .top3-rank { background: #2ecc71; color: #fff; }
.top3-title {
  font-weight: 600;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
}
.error-box {
  background: #fde8e8;
  border: 1px solid #f5c6c6;
  color: #9b2c2c;
  padding: 16px;
  border-radius: 8px;
  margin: 12px 0;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>中文依存句法分析器</h1>
    <p>Dependency Parsing Analyzer for Chinese Text · 纯前端实现 · 规则驱动</p>
  </div>

  <div class="input-section">
    <textarea id="inputText" placeholder="请在此输入需要分析的中文文本...&#10;&#10;示例：我是一个学生。今天天气很好，我和朋友一起去公园散步。"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnAnalyze" onclick="runAnalysis()">开始分析</button>
      <button class="btn btn-secondary" onclick="loadSample(1)">加载示例1（简单）</button>
      <button class="btn btn-secondary" onclick="loadSample(2)">加载示例2（中等）</button>
      <button class="btn btn-secondary" onclick="loadSample(3)">加载示例3（复杂）</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>
  </div>

  <div id="outputArea" class="output-section"></div>
</div>

const NOUN_SUFFIXES = ['子','头','儿','者','家','员','性','度','化','主义','学','论','法','器','机','品','物','体','处','所','长','师','生','工','匠','手','族','派','界'];

  '简单': '#27ae60',
  '中等': '#f39c12',
  '较难': '#e67e22',

// ============================================================
// 安全包装
// ============================================================
function safe(fn, fallback) {
  try { return fn(); }
  catch (e) { console.error(e); return fallback; }
}

// ============================================================
// 分词器：正向最大匹配 (FMM)
// ============================================================
function tokenize(sentence) {
  return safe(() => {
    const tokens = [];
    let i = 0;
    const len = sentence.length;
    const MAX_WORD_LEN = 8;
    while (i < len) {
      const ch = sentence[i];
      if (/\s/.test(ch)) { i++; continue; }
      if (/[，。！？、；：""''（）《》【】……—\-,.!?;:()\[\]{}""'']/.test(ch)) {
        tokens.push(ch); i++; continue;
      }
      if (/[a-zA-Z0-9]/.test(ch)) {
        let j = i;
        while (j < len && /[a-zA-Z0-9]/.test(sentence[j])) j++;
        tokens.push(sentence.substring(i, j));
        i = j; continue;
      }
      let matched = false;
      for (let wlen = Math.min(MAX_WORD_LEN, len - i); wlen >= 1; wlen--) {
        const word = sentence.substring(i, i + wlen);
        if (DICT[word] !== undefined) {
          tokens.push(word); i += wlen; matched = true; break;
        }
      }
      if (!matched) { tokens.push(ch); i++; }
    }
    return tokens;
  }, []);
}

// ============================================================
// 词性标注
// ============================================================
function posTag(tokens) {
  return safe(() => tokens.map(t => {
    if (/^[，。！？、；：""''（）《》【】……—\-,.!?;:()\[\]{}""''\s]$/.test(t)) return { word: t, pos: 'w' };
    if (/^[\d]+$/.test(t)) return { word: t, pos: 'm' };
    if (DICT[t] !== undefined) return { word: t, pos: DICT[t] };
    if (/^[a-zA-Z]+$/.test(t)) return { word: t, pos: 'n' };
    const lastChar = t[t.length - 1] || '';
    const lastTwo = t.length >= 2 ? t.substring(t.length - 2) : '';
    if (VERB_SUFFIXES.includes(lastTwo) || VERB_SUFFIXES.includes(lastChar)) return { word: t, pos: 'v' };
    if (NOUN_SUFFIXES.includes(lastChar) || NOUN_SUFFIXES.includes(lastTwo)) return { word: t, pos: 'n' };
    if (ADJ_SUFFIXES.includes(lastChar)) return { word: t, pos: 'a' };
    return { word: t, pos: 'n' };
  }), []);
}

// ============================================================
// 依存句法分析器 (规则驱动)
// ============================================================
function dependencyParse(taggedTokens) {
  return safe(() => {
    const n = taggedTokens.length;
    if (n === 0) return { triples: [], heads: [], rels: [], rootIdx: -1 };
    const words = taggedTokens.map(t => t.word);
    const poses = taggedTokens.map(t => t.pos);
    const heads = new Array(n).fill(-1);
    const rels = new Array(n).fill('');
    const attached = new Array(n).fill(false);

    function isPOS(i, list) { return i >= 0 && i < n && list.includes(poses[i]); }
    function isNoun(i) { return isPOS(i, ['n', 'r', 't', 's', 'f', 'm', 'q']); }
    function isVerb(i) { return isPOS(i, ['v', 'a']); }
    function isAdj(i) { return isPOS(i, ['a']); }
    function isAdv(i) { return isPOS(i, ['d']); }
    function isPrep(i) { return isPOS(i, ['p']); }
    function isConj(i) { return isPOS(i, ['c']); }
    function isPunct(i) { return isPOS(i, ['w']); }
    function isParticle(i) { return isPOS(i, ['u']); }

    // Step 1: ROOT
    let rootIdx = -1;
    for (let i = n - 1; i >= 0; i--) {
      if (isVerb(i) && !isConj(i)) { rootIdx = i; break; }
    }
    if (rootIdx === -1) {
      for (let i = n - 1; i >= 0; i--) {
        if (isAdj(i)) { rootIdx = i; break; }
      }
    }
    if (rootIdx === -1) {
      for (let i = n - 1; i >= 0; i--) {
        if (!isPunct(i) && !isParticle(i) && !isConj(i)) { rootIdx = i; break; }
      }
    }
    if (rootIdx === -1) {
      for (let i = 0; i < n; i++) { if (!isPunct(i)) { rootIdx = i; break; } }
    }
    if (rootIdx < 0) rootIdx = 0;
    heads[rootIdx] = -1;
    rels[rootIdx] = 'ROOT';
    attached[rootIdx] = true;

    // Step 2: SBV
    for (let i = rootIdx - 1; i >= 0; i--) {
      if (!attached[i] && isNoun(i) && !isPunct(i)) {
        heads[i] = rootIdx; rels[i] = 'SBV'; attached[i] = true; break;
      }
    }

    // Step 3: VOB
    for (let i = rootIdx + 1; i < n; i++) {
      if (!attached[i] && isNoun(i) && !isPunct(i)) {
        heads[i] = rootIdx; rels[i] = 'VOB'; attached[i] = true; break;
      }
    }

    // Step 4: 把/被
    for (let i = 0; i < n; i++) {
      if (!attached[i] && (words[i] === '把' || words[i] === '将')) {
        for (let j = i + 1; j < n; j++) {
          if (!attached[j] && isNoun(j)) {
            heads[j] = rootIdx; rels[j] = 'FOB'; attached[j] = true;
            heads[i] = rootIdx; rels[i] = 'ADV'; attached[i] = true; break;
          }
        }
      }
      if (!attached[i] && words[i] === '被') {
        heads[i] = rootIdx; rels[i] = 'ADV'; attached[i] = true;
        for (let j = i + 1; j < n; j++) {
          if (!attached[j] && isNoun(j)) {
            heads[j] = rootIdx; rels[j] = 'SBV'; attached[j] = true; break;
          }
        }
      }
    }

    // Step 5: 的
    for (let i = 0; i < n; i++) {
      if (words[i] === '的' && !attached[i]) {
        let rightHead = -1;
        for (let j = i + 1; j < n; j++) {
          if (!isPunct(j) && !isParticle(j)) { rightHead = j; break; }
        }
        if (rightHead >= 0) {
          heads[i] = rightHead; rels[i] = 'RAD'; attached[i] = true;
          for (let j = i - 1; j >= 0; j--) {
            if (!attached[j] && !isPunct(j) && !isParticle(j)) {
              heads[j] = rightHead; rels[j] = 'ATT'; attached[j] = true; break;
            }
          }
        }
      }
    }

    // Step 6: ADV
    for (let i = 0; i < n; i++) {
      if (!attached[i] && isAdv(i)) {
        for (let j = i + 1; j < n; j++) {
          if (isVerb(j) || isAdj(j)) {
            heads[i] = j; rels[i] = 'ADV'; attached[i] = true; break;
          }
        }
        if (!attached[i]) {
          for (let j = i - 1; j >= 0; j--) {
            if (isVerb(j) || isAdj(j)) {
              heads[i] = j; rels[i] = 'ADV'; attached[i] = true; break;
            }
          }
        }
      }
    }

    // Step 7: 得 CMP
    for (let i = 0; i < n; i++) {
      if (words[i] === '得' && !attached[i]) {
        for (let j = i - 1; j >= 0; j--) {
          if (isVerb(j)) {
            heads[i] = j; rels[i] = 'RAD'; attached[i] = true;
            for (let k = i + 1; k < n; k++) {
              if (!attached[k] && !isPunct(k)) {
                heads[k] = j; rels[k] = 'CMP'; attached[k] = true; break;
              }
            }
            break;
          }
        }
      }
    }

    // Step 8: 动词后补语
    for (let i = 0; i < n; i++) {
      if (attached[i] && isVerb(i)) {
        for (let j = i + 1; j < n; j++) {
          if (!attached[j] && !isPunct(j) && !isNoun(j) && !isAdv(j) && !isConj(j) && !isPrep(j)) {
            if ((isVerb(j) || isAdj(j)) && words[j].length === 1) {
              heads[j] = i; rels[j] = 'CMP'; attached[j] = true;
            }
          }
        }
      }
    }

    // Step 9: POB
    for (let i = 0; i < n; i++) {
      if (!attached[i] && isPrep(i)) {
        for (let j = i + 1; j < n; j++) {
          if (!attached[j] && isNoun(j)) {
            heads[j] = i; rels[j] = 'POB'; attached[j] = true; break;
          }
        }
        let prepHead = rootIdx;
        for (let j = i - 1; j >= 0; j--) { if (isVerb(j)) { prepHead = j; break; } }
        for (let j = i + 1; j < n; j++) { if (isVerb(j)) { prepHead = j; break; } }
        heads[i] = prepHead; rels[i] = 'ADV'; attached[i] = true;
      }
    }

    // Step 10: COO
    for (let i = 0; i < n; i++) {
      if ((words[i] === '和' || words[i] === '与' || words[i] === '以及' || words[i] === '、' || words[i] === '或' || words[i] === '或者') && !attached[i]) {
        for (let j = i - 1; j >= 0; j--) {
          if (!isPunct(j) && !isParticle(j) && !isConj(j)) {
            heads[i] = j; rels[i] = 'LAD'; attached[i] = true;
            for (let k = i + 1; k < n; k++) {
              if (!attached[k] && !isPunct(k) && !isParticle(k) && !isConj(k)) {
                if (poses[k] === poses[j] || (isNoun(j) && isNoun(k)) || (isVerb(j) && isVerb(k))) {
                  heads[k] = j; rels[k] = 'COO'; attached[k] = true;
                }
                break;
              }
            }
            break;
          }
        }
      }
    }

    // Step 11: 连词
    for (let i = 0; i < n; i++) {
      if (!attached[i] && isConj(i)) {
        heads[i] = rootIdx; rels[i] = 'ADV'; attached[i] = true;
      }
    }

    // Step 12: 剩余
    for (let i = 0; i < n; i++) {
      if (!attached[i] && isPunct(i)) {
        heads[i] = rootIdx; rels[i] = 'IS'; attached[i] = true;
      }
    }
    for (let i = 0; i < n; i++) {
      if (!attached[i]) {
        let bestHead = rootIdx;
        let bestDist = Infinity;
        for (let j = 0; j < n; j++) {
          if (attached[j] && !isPunct(j) && Math.abs(i - j) < bestDist) {
            bestDist = Math.abs(i - j); bestHead = j;
          }
        }
        heads[i] = bestHead; rels[i] = 'ATT'; attached[i] = true;
      }
    }

    const triples = [];
    for (let i = 0; i < n; i++) {
      triples.push({
        dep: i, depWord: words[i], depPos: poses[i],
        head: heads[i], headWord: heads[i] >= 0 ? words[heads[i]] : 'ROOT',
        rel: rels[i]
      });
    }
    return { triples, heads, rels, rootIdx };
  }, { triples: [], heads: [], rels: [], rootIdx: -1 });
}

// ============================================================
// 指标计算
// ============================================================
function calcMDD(triples) {
  return safe(() => {
    const deps = triples.filter(t => t.rel !== 'ROOT' && t.rel !== 'IS');
    if (deps.length === 0) return 0;
    let total = 0;
    for (const d of deps) total += Math.abs(d.dep - d.head);
    return total / deps.length;
  }, 0);
}

function calcMaxDepth(heads, rootIdx) {
  return safe(() => {
    if (rootIdx < 0 || heads.length === 0) return 0;
    const n = heads.length;
    const children = new Array(n).fill(null).map(() => []);
    for (let i = 0; i < n; i++) {
      if (heads[i] >= 0 && heads[i] < n) children[heads[i]].push(i);
    }
    function dfs(node, depth) {
      if (children[node].length === 0) return depth;
      let maxChild = depth;
      for (const c of children[node]) maxChild = Math.max(maxChild, dfs(c, depth + 1));
      return maxChild;
    }
    return dfs(rootIdx, 1);
  }, 1);
}

function calcDSDI(wordCount, maxDepth, mdd, depTypesCount) {
  return safe(() => wordCount * 0.2 + maxDepth * 3.0 + mdd * 4.0 + depTypesCount * 2.0, 0);
}

function getDifficulty(dsdi) {
  if (dsdi < 20) return { level: '简单', cls: 'badge-easy' };
  if (dsdi < 40) return { level: '中等', cls: 'badge-medium' };
  if (dsdi < 60) return { level: '较难', cls: 'badge-hard' };
  if (dsdi < 80) return { level: '困难', cls: 'badge-veryhard' };
  return { level: '极难', cls: 'badge-extreme' };
}

// ============================================================
// 依存树可视化
// ============================================================
function buildTreeVisualization(heads, rels, words, rootIdx) {
  return safe(() => {
    if (rootIdx < 0 || heads.length === 0) return '(无树结构)';
    const n = heads.length;
    const children = new Array(n).fill(null).map(() => []);
    for (let i = 0; i < n; i++) {
      if (heads[i] >= 0 && heads[i] < n) children[heads[i]].push({ idx: i, rel: rels[i] });
    }
    const lines = [];
    function render(node, prefix, isLast) {
      const connector = isLast ? '└── ' : '├── ';
      const nodeLabel = node === rootIdx ? `ROOT: ${words[node]}` : `${rels[node]}: ${words[node]}`;
      lines.push(prefix + connector + nodeLabel);
      const childNodes = children[node];
      const extPrefix = isLast ? '    ' : '│   ';
      for (let i = 0; i < childNodes.length; i++) {
        render(childNodes[i].idx, prefix + extPrefix, i === childNodes.length - 1);
      }
    }
    lines.push(`ROOT: ${words[rootIdx]}`);
    const childNodes = children[rootIdx];
    for (let i = 0; i < childNodes.length; i++) {
      render(childNodes[i].idx, '', i === childNodes.length - 1);
    }
    return lines.join('\n');
  }, '(树结构错误)');
}

// ============================================================
// 句子切分
// ============================================================
function segmentSentences(text, mode) {
  return safe(() => {
    let rawSentences = [];
    if (mode === 'A') {
      rawSentences = text.split(/[。？！……]+/).filter(s => s.trim());
    } else if (mode === 'B') {
      if (text.includes('\n')) {
        rawSentences = text.split(/\n+/).filter(s => s.trim());
      } else if (/\s{2,}/.test(text)) {
        rawSentences = text.split(/\s{2,}/).filter(s => s.trim());
      } else {
        const keywords = ['但是','然而','因此','所以','因为','而且','并且','不过','可是','于是','从而','此外','另外'];
        rawSentences = [text];
        for (const kw of keywords) {
          const newParts = [];
          for (const s of rawSentences) {
            const parts = s.split(kw);
            for (let i = 0; i < parts.length; i++) {
              if (parts[i].trim()) newParts.push(parts[i].trim());
              if (i < parts.length - 1) newParts.push(kw);
            }
          }
          rawSentences = newParts;
        }
        const merged = [];
        let buf = '';
        for (const s of rawSentences) {
          if (buf && (buf.length + s.length < 30)) { buf += s; }
          else { if (buf) merged.push(buf); buf = s; }
        }
        if (buf) merged.push(buf);
        rawSentences = merged;
      }
    } else {
      const tokens = tokenize(text);
      const chunkSize = 15;
      for (let i = 0; i < tokens.length; i += chunkSize) {
        rawSentences.push(tokens.slice(i, i + chunkSize).join(''));
      }
    }
    return rawSentences.filter(s => {
      const t = s.trim();
      if (t.length === 0) return false;
      if (/^[\d\s]+$/.test(t)) return false;
      if (/^[，。！？、；：""''（）《》【】……—\-,.!?;:()\[\]{}""''\s]+$/.test(t)) return false;
      if (t.replace(/[，。！？、；：""''（）《》【】……—\-,.!?;:()\[\]{}""''\s]/g, '').length <= 1) return false;
      return true;
    });
  }, []);
}

// ============================================================
// 单句分析
// ============================================================
function analyzeSingleSentence(sentence, idx) {
  return safe(() => {
    const tokens = tokenize(sentence);
    const tagged = posTag(tokens);
    const contentTokens = tagged.filter(t => t.pos !== 'w');
    const wordCount = contentTokens.length;
    const { triples, heads, rels, rootIdx } = dependencyParse(tagged);
    const mdd = calcMDD(triples);
    const maxDepth = calcMaxDepth(heads, rootIdx);
    const depTypes = [...new Set(triples.map(t => t.rel))];
    const depTypesCount = depTypes.length;
    const dsdi = calcDSDI(wordCount, maxDepth, mdd, depTypesCount);
    const diff = getDifficulty(dsdi);
    const treeVis = buildTreeVisualization(heads, rels, tagged.map(t => t.word), rootIdx);
    return {
      sentence, idx, tokens, tagged, triples, heads, rels, rootIdx,
      wordCount, mdd, maxDepth, depTypesCount, depTypes, dsdi, diff,
      treeVis,
      rootWord: rootIdx >= 0 ? (tagged[rootIdx]?.word || '(无)') : '(无)',
      sbvWords: triples.filter(t => t.rel === 'SBV').map(t => t.depWord),
      vobWords: triples.filter(t => t.rel === 'VOB').map(t => t.depWord),
      attWords: triples.filter(t => t.rel === 'ATT').map(t => t.depWord),
      advWords: triples.filter(t => t.rel === 'ADV').map(t => t.depWord),
    };
  }, {
    sentence, idx: idx || 0, tokens: [], tagged: [], triples: [], heads: [], rels: [], rootIdx: -1,
    wordCount: 0, mdd: 0, maxDepth: 0, depTypesCount: 0, depTypes: [], dsdi: 0,
    diff: { level: '简单', cls: 'badge-easy' }, treeVis: '(分析失败)',
    rootWord: '(无)', sbvWords: [], vobWords: [], attWords: [], advWords: []
  });
}

// ============================================================
// 图表绘制
// ============================================================
function drawPieChart(canvasId, data) {
  safe(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const cx = w / 2, cy = h / 2;
    const r = Math.min(w, h) / 2 - 10;
    const total = data.reduce((s, d) => s + d.value, 0);
    if (total === 0) {
      ctx.fillStyle = '#999';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('暂无数据', cx, cy);
      return;
    }
    let startAngle = -Math.PI / 2;
    for (const item of data) {
      if (item.value === 0) continue;
      const angle = (item.value / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAngle, startAngle + angle);
      ctx.closePath();
      ctx.fillStyle = item.color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      startAngle += angle;
    }
  }, null);
}

function drawBarChart(canvasId, data, maxValue) {
  safe(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const padding = { top: 10, right: 10, bottom: 30, left: 40 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    if (data.length === 0) {
      ctx.fillStyle = '#999';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('暂无数据', w / 2, h / 2);
      return;
    }
    const max = maxValue || Math.max(...data.map(d => d.value));
    const barW = Math.min(chartW / data.length * 0.6, 40);
    const gap = chartW / data.length;

    // 坐标轴
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padding.left, padding.top);
    ctx.lineTo(padding.left, h - padding.bottom);
    ctx.lineTo(w - padding.right, h - padding.bottom);
    ctx.stroke();

    // 柱形
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    for (let i = 0; i < data.length; i++) {
      const barH = (data[i].value / max) * chartH;
      const x = padding.left + i * gap + (gap - barW) / 2;
      const y = h - padding.bottom - barH;
      ctx.fillStyle = data[i].color || '#0f3460';
      ctx.fillRect(x, y, barW, barH);
      // 数值
      ctx.fillStyle = '#333';
      ctx.fillText(data[i].value, x + barW / 2, y - 3);
      // 标签
      ctx.fillStyle = '#666';
      ctx.fillText(data[i].label, x + barW / 2, h - padding.bottom + 14);
    }
  }, null);
}

// ============================================================
// 主分析流程
// ============================================================
function runAnalysis() {
  const btn = document.getElementById('btnAnalyze');
  btn.disabled = true;
  const rawText = document.getElementById('inputText').value;
  const output = document.getElementById('outputArea');

  if (!rawText.trim()) {
    output.innerHTML = '<div class="error-box">请输入文本后再分析。</div>';
    btn.disabled = false;
    return;
  }

  output.innerHTML = '<div class="loading-text"><span class="spinner"></span>正在分析中，请稍候...</div>';

  setTimeout(() => {
    try {
      const results = performAnalysis(rawText);
      renderResults(results, output);
    } catch (e) {
      output.innerHTML = `<div class="error-box">分析出错：${e.message}</div>`;
      console.error(e);
    } finally {
      btn.disabled = false;
    }
  }, 50);
}

function performAnalysis(rawText) {
  return safe(() => {
    // 阶段零
    const puncMatches = rawText.match(/[。？！……]/g);
    const puncCount = puncMatches ? puncMatches.length : 0;
    const newlineCount = (rawText.match(/\n/g) || []).length;
    const spaceCount = (rawText.match(/\s/g) || []).length;
    const totalChars = rawText.replace(/\s/g, '').length;
    let mode = totalChars === 0 ? 'C' : (puncCount / totalChars >= 0.01 ? 'A' : 'B');
    const phase0 = { puncCount, newlineCount, spaceCount, totalChars, mode };

    // 阶段一
    const sentences = segmentSentences(rawText, mode);
    const totalSentences = sentences.length;
    const phase1 = { mode, totalSentences, sentences };

    // 阶段二
    const sentenceResults = [];
    let totalWordsAll = 0;
    for (let i = 0; i < sentences.length; i++) {
      const r = analyzeSingleSentence(sentences[i], i + 1);
      sentenceResults.push(r);
      totalWordsAll += r.wordCount;
    }
    const phase2 = { sentenceResults, totalWordsAll };

    // 排序
    const sortedByDsdi = [...sentenceResults].sort((a, b) => b.dsdi - a.dsdi);

    // 阶段三：复审
    let review1Passed = 0, review1Fixed = 0;
    const review1Details = [];
    for (const r of sentenceResults) {
      const hasRoot = r.triples.some(t => t.rel === 'ROOT');
      let cycle = false;
      for (let i = 0; i < r.tagged.length; i++) {
        const visited = new Set();
        function check(node) {
          if (node < 0) return false;
          if (visited.has(node)) return true;
          visited.add(node);
          return check(r.heads[node]);
        }
        if (check(i)) { cycle = true; break; }
      }
      if (hasRoot && !cycle) review1Passed++;
      else { review1Fixed++; review1Details.push(`S${r.idx}: ${!hasRoot ? '缺少ROOT' : ''}${!hasRoot && cycle ? '、' : ''}${cycle ? '存在环' : ''}`); }
    }
    const review1 = { passed: review1Passed, fixed: review1Fixed, details: review1Details };

    const review2Rows = [];
    for (const r of sentenceResults) {
      const mddRe = calcMDD(r.triples);
      const mdRe = calcMaxDepth(r.heads, r.rootIdx);
      const dtRe = [...new Set(r.triples.map(t => t.rel))].length;
      const dsdiRe = calcDSDI(r.wordCount, mdRe, mddRe, dtRe);
      for (const c of [
        { metric: 'MDD', orig: r.mdd.toFixed(2), recalc: mddRe.toFixed(2), ok: Math.abs(r.mdd - mddRe) < 0.01 },
        { metric: 'DSDI', orig: r.dsdi.toFixed(1), recalc: dsdiRe.toFixed(1), ok: Math.abs(r.dsdi - dsdiRe) < 0.1 }
      ]) {
        review2Rows.push({ sid: `S${r.idx}`, ...c });
      }
    }
    const review2 = { rows: review2Rows };

    const diffCounts = { '简单': 0, '中等': 0, '较难': 0, '困难': 0, '极难': 0 };
    for (const r of sentenceResults) diffCounts[r.diff.level] = (diffCounts[r.diff.level] || 0) + 1;
    const review3 = {
      pctSumOk: Object.values(diffCounts).reduce((a, b) => a + b, 0) === sentenceResults.length,
      top3Correct: sortedByDsdi.length < 3 || (sortedByDsdi[0].dsdi >= sortedByDsdi[1].dsdi && sortedByDsdi[1].dsdi >= sortedByDsdi[2].dsdi),
      diffCounts
    };

    // 阶段四
    const avgDsdi = sentenceResults.length > 0 ? sentenceResults.reduce((s, r) => s + r.dsdi, 0) / sentenceResults.length : 0;
    const maxDsdiResult = sentenceResults.length > 0 ? sortedByDsdi[0] : null;
    const minDsdiResult = sentenceResults.length > 0 ? sortedByDsdi[sortedByDsdi.length - 1] : null;
    const avgLen = sentenceResults.length > 0 ? totalWordsAll / sentenceResults.length : 0;
    const depDist = {};
    for (const r of sentenceResults) for (const t of r.triples) depDist[t.rel] = (depDist[t.rel] || 0) + 1;
    const totalDeps = Object.values(depDist).reduce((a, b) => a + b, 0);
    const overallLoad = avgDsdi < 25 ? '低' : avgDsdi < 50 ? '中' : '高';
    const phase4 = {
      totalSentences, totalWordsAll, avgLen, avgDsdi, maxDsdiResult, minDsdiResult,
      diffCounts, depDist, totalDeps, overallLoad
    };

    // Top3
    const top3 = sortedByDsdi.slice(0, 3);

    return { rawText, phase0, phase1, phase2, review1, review2, review3, phase4, top3, sentenceResults, sortedByDsdi };
  }, null);
}

// ============================================================
// 折叠切换
// ============================================================
function toggleCollapse(el) {
  const body = el.nextElementSibling || el.parentElement.nextElementSibling;
  if (body && body.classList.contains('collapse-body')) {
    body.classList.toggle('hidden');
    el.classList.toggle('collapsed');
  } else if (el.classList.contains('collapse-toggle')) {
    const next = el.nextElementSibling;
    if (next && next.classList.contains('collapse-body')) {
      next.classList.toggle('hidden');
      el.classList.toggle('collapsed');
    }
  }
}

// ============================================================
// 辅助函数
// ============================================================
function getDifficultyExplanation(r) {
  return safe(() => {
    const parts = [];
    if (r.wordCount > 10) parts.push(`词语数量较多(${r.wordCount}词)`);
    if (r.maxDepth > 3) parts.push(`依存深度大(深度${r.maxDepth})`);
    if (r.mdd > 2.5) parts.push(`依存距离较长(MDD=${r.mdd.toFixed(2)})`);
    if (r.depTypesCount > 6) parts.push(`依存关系类型丰富(${r.depTypesCount}种)`);
    if (parts.length === 0) parts.push('句式结构简单，认知负荷低');
    return parts.join('；');
  }, '无法分析');
}

function getSimplifiedVersion(r) {
  return safe(() => {
    const sbv = r.sbvWords.join('');
    const vob = r.vobWords.join('');
    const root = r.rootWord;
    if (sbv && root && vob && root !== '(无)') {
      return `（建议简化）${sbv}${root}${vob}。可将修饰成分拆分为独立短句。`;
    }
    return '（句式已较简洁，无需大幅简化）';
  }, '');
}

function loadSample(n) {
  const samples = {
    1: '我是一个学生。今天天气很好。',
    2: '虽然这项任务非常困难，但是经过团队成员的不懈努力和密切配合，我们最终成功地完成了所有工作，并且获得了客户的高度评价。',
    3: '在当今这个信息技术飞速发展的时代，人工智能技术的广泛应用不仅深刻地改变了人们的生活方式和工作模式，而且对全球经济结构和社会发展产生了深远的影响，因此各国政府和企业都在积极推动相关领域的研究与创新。'
  };
  document.getElementById('inputText').value = samples[n] || '';
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputArea').innerHTML = '';
}
